<h2>{{ title() }}</h2>

<!-- @if (hotelList.length > 0) {  -->

<button (click)="propertyTypes.set('Hotel')">Hotels</button>
<button (click)="propertyTypes.set('Motel')">Motels</button>
<button (click)="propertyTypes.set('Resort')">Resorts</button>
<button (click)="propertyTypes.set('Hostel')">Hostels</button>

@switch (propertyTypes()) {
  @case ('Hotel') {
    <hm-hotel [hotels]="hotelList()" (removeRooms)="handleRemoveRooms($event)" />
  }
  @case ('Motel') {
    <h4>No motels available.</h4>
  }
  @case ('Resort') {
    <h4>No resorts available.</h4>
  }
  @case ('Hostel') {
    <h4>No hostels available.</h4>
  }
  @default {
    <h4>Something went wrong. Please try again later.</h4>
  }
}
